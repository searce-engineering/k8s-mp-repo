# apptest/deployer/schema.yaml
x-google-marketplace:
  schemaVersion: v2
  applicationApiVersion: v1beta1
  publishedVersion: '1.0.0'
  publishedVersionMetadata:
    releaseNote: "Automated test release"
    releaseTypes:
    - Feature
    recommended: false
  images:
    "":
      properties:
        repository:
          type: FULL
          default: us-docker.pkg.dev/searce-cloud-products/gcp-mp-poc-k8s/app:1.0.0

properties:
  namespace:
    type: string
    x-google-marketplace:
      type: NAMESPACE
  name:
    type: string
    x-google-marketplace:
      type: NAME

  # ── INJECTED TEST DEFAULTS (Flattened Keys) ──────────────────────────────
  licenseKey:
    type: string
    default: "test-license-key-12345"
  
  licenseSecret:
    type: string
    default: "test-secret-12345"

  reportingSecret:
    type: string
    x-google-marketplace:
      type: REPORTING_SECRET
    default: "test-reporting-secret"

required:
  - name
  - namespace
  - licenseKey
  - licenseSecret
  - reportingSecret
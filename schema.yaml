x-google-marketplace:
  schemaVersion: v2
  applicationApiVersion: v1beta1
  publishedVersion: "1.0.0"
  publishedVersionMetadata:
    releaseNote: "Initial Release of the IBM Watsonx GKE BYOL Integration POC."
    releaseTypes:
      - Feature
    recommended: false
  
  # MUST exist: Maps the logical image to the property below
  images:
    "":
      properties:
        repository:
          type: FULL
          default: us-docker.pkg.dev/searce-cloud-products/mp-poc-k8s-denis/my-poc-app:1.0.0

properties:
  name:       
    type: string
    x-google-marketplace:
      type: NAME
  namespace:  
    type: string
    x-google-marketplace:
      type: NAMESPACE

required:
  - name
  - namespace
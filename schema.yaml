# schema.yaml — GCP Marketplace deployer schema
# Drives the "Configure & Deploy" UI shown to customers.
# Docs: https://cloud.google.com/marketplace/docs/partners/kubernetes/create-app-package
x-google-marketplace:
  schemaVersion: v2
  applicationApiVersion: v1beta1
  publishedVersion: '1.0.0'
  publishedVersionMetadata:
    releaseNote: >-
      Initial release.
    releaseTypes:
    - Feature
    recommended: false
  images:
    "":
      properties:
        repository:
          type: FULL
          default: us-docker.pkg.dev/searce-cloud-products/gcp-mp-poc-k8s/app:1.0.0

properties:
  # ── Kubernetes namespace ────────────────────────────────────────────────────
  namespace:
    type: string
    x-google-marketplace:
      type: NAMESPACE

  # ── App name (instance name) ─────────────────────────────────────────────
  name:
    type: string
    x-google-marketplace:
      type: NAME

  # ── Replica count ─────────────────────────────────────────────────────────
  replicaCount:
    type: integer
    title: Replica Count
    description: Number of application pod replicas.
    default: 1
    minimum: 1
    maximum: 10

  # ── BYOL License Key ──────────────────────────────────────────────────────
  license.licenseKey:
    type: string
    title: BYOL License Key
    description: >
      Your pre-purchased license key. Contact support@your-company.com to
      obtain a license before deploying.

  # ── License Secret (server-side HMAC secret) ──────────────────────────────
  license.licenseSecret:
    type: string
    title: License Validation Secret
    description: >
      The HMAC secret used to verify the license key.
      Provided to you alongside your license key.

  # ── Service type ──────────────────────────────────────────────────────────
  service.type:
    type: string
    title: Service Type
    description: Kubernetes service exposure type.
    default: ClusterIP
    enum:
      - ClusterIP
      - LoadBalancer
      - NodePort

  # ── ServiceAccount ────────────────────────────────────────────────────────
  serviceAccount.name:
    type: string
    title: Service Account Name
    x-google-marketplace:
      type: SERVICE_ACCOUNT
      serviceAccount:
        description: >
          Service account used by the application pod.
        roles:
          - type: ClusterRole
            rulesType: PREDEFINED
            rulesFromRoleName: view

  # ── Reporting secret (required by Marketplace) ────────────────────────────
  reportingSecret:
    type: string
    x-google-marketplace:
      type: REPORTING_SECRET

required:
  - name
  - namespace
  - license.licenseKey
  - license.licenseSecret
  - reportingSecret
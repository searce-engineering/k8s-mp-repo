# apptest/deployer/chart/templates/tester.yaml
apiVersion: v1
kind: Pod
metadata:
  # The name MUST be unique to this deployment
  name: "{{ .Release.Name }}-tester"
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: "{{ .Release.Name }}"
    # Google requires this label to identify the test pod
    app.kubernetes.io/component: tester
  annotations:
    # Standard Helm hook indicating this is a test
    helm.sh/hook: test
spec:
  containers:
    - name: tester
      # Using a standard curl image to ping your application
      image: curlimages/curl:latest
      command:
        - "/bin/sh"
        - "-c"
        - |
          echo "Starting marketplace integration test..."
          SERVICE_URL="http://{{ .Release.Name }}-gcp-mp-poc-k8s:80/readyz"
          
          echo "Pinging $SERVICE_URL..."
          
          # Retry loop: Try to hit the app up to 24 times (2 minutes total)
          for i in $(seq 1 24); do
            # -s (silent), -f (fail on HTTP errors like 404/500)
            if curl -s -f "$SERVICE_URL"; then
              echo "✅ Successfully connected to the application!"
              exit 0
            fi
            echo "Attempt $i failed. Retrying in 5 seconds..."
            sleep 5
          done
          
          echo "❌ Test failed! Could not reach the application."
          exit 1
  # The pod must not restart automatically; Google reads the final exit code
  restartPolicy: Never
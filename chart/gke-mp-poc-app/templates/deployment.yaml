apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/component: {{ .Values.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
      app.kubernetes.io/component: {{ .Values.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name }}
        app.kubernetes.io/component: {{ .Values.name }}
    spec:
      containers:
        - name: app
          image: "{{ index .Values.images "py-app" "repository" }}:{{ index .Values.images "py-app" "tag" }}"
          imagePullPolicy: Always
          env:
            # 1. Inject the pasted license key from our Kubernetes Secret
            - name: LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.name }}-license-secret
                  key: license-key
            # 2. Inject the SaaS Validation API Endpoint
            - name: SAAS_VALIDATION_URL
              value: {{ .Values.saas.validationUrl | quote }}
            - name: PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
apiVersion: app.k8s.io/v1beta1
kind: Application
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
  componentKinds:
    - group: apps/v1
      kind: Deployment
    - group: v1
      kind: Service
  descriptor:
    type: mp-poc-k8s
    version: "1.0.0"
    description: "Marketplace Kubernetes App POC (BYOL)"

{{/*
  The license Secret is created by the Marketplace deployer using values
  collected from the customer during deployment configuration (schema.yaml).
  In local/dev testing you can create it manually:

    kubectl create secret generic byol-license-secret \
      --from-literal=licenseKey="<your-key>" \
      --from-literal=licenseSecret="<your-hmac-secret>"
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.licenseSecret }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gcp-mp-poc-k8s.labels" . | nindent 4 }}
type: Opaque
stringData:
  licenseKey:    {{ .Values.license.licenseKey    | default "" | quote }}
  licenseSecret: {{ .Values.license.licenseSecret | default "" | quote }}

apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: sample-app---terraform-module-display
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Sample App - Terraform Module
    source:
      repo: https://github.com/searce-engineering/k8s-mp-repo.git
      sourceType: git
      dir: /terraform
  ui:
    input:
      variables:
        cluster_location:
          name: cluster_location
          title: Cluster Location
        cluster_name:
          name: cluster_name
          title: Cluster Name
        goog_cm_deployment_name:
          name: goog_cm_deployment_name
          title: Goog Cm Deployment Name
        helm_chart_name:
          name: helm_chart_name
          title: Helm Chart Name
        helm_chart_repo:
          name: helm_chart_repo
          title: Helm Chart Repo
        helm_chart_version:
          name: helm_chart_version
          title: Helm Chart Version
        image_repo:
          name: image_repo
          title: Image Repo
        image_tag:
          name: image_tag
          title: Image Tag
        license_key:
          name: license_key
          title: License Key
        namespace:
          name: namespace
          title: Namespace
        project_id:
          name: project_id
          title: Project Id
